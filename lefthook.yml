# Lefthook configuration for git hooks
# Documentation: https://github.com/evilmartians/lefthook

pre-commit:
  parallel: true
  commands:
    lint:
      glob: "*.{js,jsx,ts,tsx}"
      run: vp lint --fix {staged_files}
      stage_fixed: true

    typecheck:
      run: vp exec tsgo --noEmit

pre-push:
  commands:
    build:
      run: vp build